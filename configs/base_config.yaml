# ─────────────────────────────────────────
#  base_config.yaml — General settings
# ─────────────────────────────────────────

data:
  data:
  raw_dir:        "/kaggle/working/data/raw"
  corrupted_dir:  "/kaggle/working/data/corrupted"
  dataset_root:   "/kaggle/input/datasets/nikhilshingadiya/tinyimagenet200/tiny-imagenet-200"
  num_classes:    200
  num_workers:    4

training:
  batch_size:     128
  epochs:         30
  lr:             0.1
  momentum:       0.9
  weight_decay:   1.0e-4
  patience:       7           # Early stopping patience
  seed:           42

model:
  architecture:   "resnet18"
  pretrained:     false
  num_models:     3           # For model disagreement method

outputs:
  checkpoints:    "/kaggle/working/checkpoints"
  scores:         "/kaggle/working/outputs/scores"
  figures:        "/kaggle/working/outputs/figures"
  reports:        "/kaggle/working/outputs/reports"
